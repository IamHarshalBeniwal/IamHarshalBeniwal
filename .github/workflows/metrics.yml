name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: IamHarshalBeniwal
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_traffic: yes
          plugin_habits: yes
